<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>ZickitO – Skypiea Waiting Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Cinzel:wght@700;900&family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sky-1:#a8e0f0; --sky-2:#6cc4e4; --sky-3:#3a9cd0; --sky-4:#1a6ca8;
  --gold:#d4a430; --gold-2:#f0c850; --gold-3:#fde488; --gold-4:#b8841a;
  --green:#7ac058; --green-2:#4a8030; --green-3:#5a9038;
  --ink:#2a1810; --cream:#fff8e8;
}
html, body { width:1920px; height:1080px; overflow:hidden; background:#74c4e0; font-family:'Cormorant Garamond',serif; }

/* SKY */
.sky { position:absolute; inset:0; background: linear-gradient(to bottom,
  #2e8ec0 0%, #58b0d8 20%, #84cae4 45%, #b4e0ec 70%, #e4f4f8 90%, #f8eed4 100%); }

/* GOD RAYS */
.god-rays { position:absolute; bottom:200px; left:50%; transform:translateX(-50%); width:1920px; height:700px; pointer-events:none; opacity:.32; z-index:2; mix-blend-mode:screen; }

/* SUN AURA */
.sun-aura { position:absolute; bottom:380px; left:50%; transform:translateX(-50%); width:1100px; height:550px;
  background:radial-gradient(ellipse 50% 70% at 50% 70%, rgba(255,250,220,.85) 0%, rgba(255,230,160,.4) 25%, rgba(255,200,120,.15) 55%, transparent 100%);
  filter:blur(8px); pointer-events:none; z-index:1; }

/* SKY CLOUDS (background, parallax) */
.bg-clouds { position:absolute; top:0; left:0; right:0; height:600px; pointer-events:none; z-index:3; }
.bg-cloud { position:absolute; animation:bgDrift var(--cd,120s) linear infinite; animation-delay:var(--cdl,0s); }
@keyframes bgDrift { from{transform:translateX(var(--cx,-300px));} to{transform:translateX(2200px);} }
.cb { position:relative; border-radius:60px; }
.cb div { position:absolute; border-radius:50%; }

/* GIANT JACK BEANSTALKS (twisted, towering) */
.beanstalk { position:absolute; pointer-events:none; z-index:4; }
.beanstalk.left  { top:-20px; left:280px; }
.beanstalk.right { top:0; right:240px; }

/* SKY ISLAND (LARGE, far horizon — Angel Island / Upper Yard scale) */
.angel-island { position:absolute; bottom:95px; left:50%; transform:translateX(-50%); z-index:5; pointer-events:none; }

/* GOLDEN CITY (Shandora) — glowing on the island */
.gold-city { position:absolute; bottom:230px; left:50%; transform:translateX(-50%); z-index:6; pointer-events:none;
  filter: drop-shadow(0 0 50px rgba(255,200,80,.9)); }

/* SHANDORA SUN (rises above pyramid, behind compass as halo) */
.shandora-sun { position:absolute; bottom:600px; left:50%; transform:translateX(-50%); z-index:6; pointer-events:none;
  filter: drop-shadow(0 0 50px rgba(255,220,140,1)); animation:sunPulse 5s ease-in-out infinite; }
@keyframes sunPulse { 0%,100%{filter:drop-shadow(0 0 50px rgba(255,220,140,1));} 50%{filter:drop-shadow(0 0 80px rgba(255,240,180,1));} }
.gold-city::after { content:''; position:absolute; inset:-30px; background:radial-gradient(circle, rgba(255,220,120,.4) 0%, transparent 70%); pointer-events:none; z-index:-1; }

/* SEA OF CLOUDS */
.cloud-sea { position:absolute; bottom:0; left:0; right:0; height:340px; z-index:7; overflow:hidden; }
.cloud-sea-bg { position:absolute; inset:0; background: linear-gradient(to bottom,
  rgba(248,240,220,.45) 0%, rgba(252,246,230,.8) 6%, #fff8e8 18%, #ffffff 38%, #f8f0d8 75%, #e8d4a0 100%); }
.cloud-horizon { position:absolute; top:0; left:0; right:0; height:4px;
  background: linear-gradient(to right, transparent 0%, rgba(255,235,180,.85) 30%, #fff8d8 50%, rgba(255,235,180,.85) 70%, transparent 100%); filter:blur(1px); z-index:8; }
.cloud-layer { position:absolute; left:-5%; width:110%; animation:cloudDrift var(--cd,80s) linear infinite; }
.cloud-layer.r { animation-direction:reverse; }
@keyframes cloudDrift { from{transform:translateX(0);} to{transform:translateX(-50%);} }

/* GOING MERRY (small, distant, sailing away) */
.merry-wrap { position:absolute; bottom:80px; left:72%; transform:translateX(-50%); z-index:14;
  animation:merryFloat 7s ease-in-out infinite; transform-origin:center bottom; }
@keyframes merryFloat {
  0%{transform:translateX(-50%) translateY(0) rotate(-.3deg);}
  35%{transform:translateX(-50%) translateY(-6px) rotate(.4deg);}
  65%{transform:translateX(-50%) translateY(-2px) rotate(-.1deg);}
  100%{transform:translateX(-50%) translateY(0) rotate(-.3deg);}
}
.merry-wake { position:absolute; bottom:68px; left:72%; transform:translateX(-50%); z-index:13; pointer-events:none; }

/* PARTICLES */
.particles { position:absolute; inset:0; pointer-events:none; z-index:10; }
.feather { position:absolute; animation:featherFall var(--ff,16s) linear infinite; animation-delay:var(--ffl,0s); opacity:0; }
@keyframes featherFall { 0%{transform:translateY(0) translateX(0) rotate(0); opacity:0;} 10%{opacity:.85;} 90%{opacity:.85;} 100%{transform:translateY(var(--fy,800px)) translateX(var(--fx,60px)) rotate(var(--fr,360deg)); opacity:0;} }
.sparkle { position:absolute; border-radius:50%; background:radial-gradient(circle, white 0%, rgba(255,240,180,.5) 50%, transparent 100%); animation:sparkleTwk var(--st,3s) ease-in-out infinite alternate; animation-delay:var(--stl,0s); }
@keyframes sparkleTwk { from{opacity:.1; transform:scale(.5);} to{opacity:.95; transform:scale(1.3);} }

/* BIRDS */
.birds { position:absolute; inset:0; pointer-events:none; z-index:11; }
.bird { position:absolute; animation:birdFly var(--bd,30s) linear infinite; animation-delay:var(--bdl,0s); }
@keyframes birdFly { from{transform:translateX(var(--bx,-120px)) translateY(0);} to{transform:translateX(2100px) translateY(var(--by,-40px));} }
.bird-wings { animation:bflap var(--bf,.8s) ease-in-out infinite alternate; }
@keyframes bflap { from{transform:scaleY(1);} to{transform:scaleY(-.4);} }

/* CONTENT */
.content { position:absolute; top:48px; left:0; right:0; display:flex; flex-direction:column; align-items:center; z-index:20; }
.deco-label { display:flex; align-items:center; gap:14px; margin-bottom:10px; animation:fdDown 1.2s ease both .1s; }
.deco-label span { font-family:'Cinzel',serif; font-size:11px; letter-spacing:7px; text-transform:uppercase; color:var(--gold-4); text-shadow:0 1px 2px rgba(255,255,255,.6); }
.deco-label::before, .deco-label::after { content:''; width:70px; height:1px; background:linear-gradient(to right, transparent, var(--gold)); }
.deco-label::after { background:linear-gradient(to left, transparent, var(--gold)); }

.channel-row { display:flex; align-items:center; gap:14px;
  filter: drop-shadow(0 4px 14px rgba(120,80,30,.4)) drop-shadow(0 0 24px rgba(255,255,255,.5));
  animation:fdDown 1.2s cubic-bezier(.34,1.56,.64,1) both .2s; }
.wing { opacity:.85; }
.channel-wrap { display:flex; align-items:center; gap:0; }
.name-zickit { font-family:'Bangers',cursive; font-size:108px; line-height:1; color:var(--cream);
  -webkit-text-stroke:4px var(--ink); text-shadow:4px 5px 0 var(--ink), 0 0 40px rgba(255,255,255,.6), 0 0 60px rgba(255,220,140,.5); letter-spacing:3px; }
.o-wrap { position:relative; width:120px; height:158px; margin-left:5px; flex-shrink:0; }

.tagline { font-family:'Cinzel Decorative',cursive; font-size:14px; letter-spacing:7px; color:var(--cream);
  text-shadow:0 2px 6px rgba(50,30,20,.4), 0 0 24px rgba(255,255,255,.6); margin-top:8px; font-weight:700; animation:fdUp 1.2s ease both .5s; position:relative; z-index:21; }

/* COMPASS — smaller now */
.compass-wrap { margin-top:24px; animation:fdUp 1.4s ease both .6s; position:relative; z-index:21; }
.compass-wrap::before { content:''; position:absolute; inset:-30px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,250,220,.4) 0%, transparent 70%); z-index:-1; }
.compass-ring { position:relative; width:200px; height:200px; }
.compass-bezel { position:absolute; inset:0; width:100%; height:100%; animation:spin 60s linear infinite; }
@keyframes spin { from{transform:rotate(0);} to{transform:rotate(360deg);} }
.progress-arc { position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); }
.arc-track { fill:none; stroke:rgba(212,164,48,.18); stroke-width:3; }
.arc-fill { fill:none; stroke:url(#arcG); stroke-width:3; stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
.compass-face { position:absolute; inset:18px; border-radius:50%;
  background: radial-gradient(circle at 38% 32%, rgba(255,248,232,.92) 0%, rgba(240,224,184,.92) 60%, rgba(212,168,120,.92) 100%);
  border:2px solid rgba(212,164,48,.6);
  box-shadow: inset 0 0 25px rgba(180,130,60,.3), 0 0 22px rgba(255,255,255,.5), 0 0 40px rgba(212,164,48,.3);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  backdrop-filter: blur(2px); }
.t-lbl { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--gold-4); margin-bottom:3px; font-weight:700; }
.t-dig { font-family:'Cinzel',serif; font-size:42px; font-weight:900; color:var(--ink); line-height:1; text-shadow:0 0 16px rgba(255,255,255,.6); letter-spacing:2px; }
.t-unit { font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--green-2); margin-top:3px; opacity:.7; }

.bottom-msg { margin-top:18px; text-align:center; animation:fdUp 1.6s ease both .7s; }
.bottom-msg h2 { font-family:'Cinzel Decorative',cursive; font-size:16px; letter-spacing:4px; color:var(--cream);
  text-shadow:0 2px 6px rgba(50,30,20,.5), 0 0 24px rgba(255,255,255,.6); font-weight:700; }
.bottom-msg p { font-family:'Cinzel',serif; font-size:10px; letter-spacing:5px; text-transform:uppercase; color:var(--gold-4); margin-top:8px; text-shadow:0 1px 2px rgba(255,255,255,.5); font-weight:600; }

/* CORNERS */
.corner { position:absolute; width:120px; height:120px; z-index:25; pointer-events:none; }
.corner.tl { top:24px; left:24px; }
.corner.tr { top:24px; right:24px; transform:scaleX(-1); }
.corner.bl { bottom:24px; left:24px; transform:scaleY(-1); }
.corner.br { bottom:24px; right:24px; transform:scale(-1,-1); }

@keyframes fdDown { from{opacity:0; transform:translateY(-22px);} to{opacity:1; transform:translateY(0);} }
@keyframes fdUp { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

/* LIVE */
.live-overlay { position:absolute; inset:0; opacity:0; pointer-events:none; background:#fde488; z-index:50; }
.live-overlay.flash { animation:lf .8s ease-in-out infinite; }
@keyframes lf { 0%,100%{opacity:0;} 50%{opacity:.35;} }
.live-banner { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(135deg,#fde488,#d4a430); border:6px solid var(--cream); border-radius:24px;
  padding:32px 80px; font-family:'Bangers',cursive; font-size:96px; color:var(--ink);
  letter-spacing:14px; text-shadow:3px 3px 0 rgba(255,255,255,.6);
  box-shadow:0 0 100px rgba(253,228,136,.9), 0 20px 40px rgba(0,0,0,.3);
  transition:transform .5s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; z-index:51; }
.live-banner.show { transform:translate(-50%,-50%) scale(1); }
</style>
</head>
<body>

<!-- SKY -->
<div class="sky"></div>
<div class="sun-aura"></div>

<!-- GOD RAYS -->
<svg class="god-rays" viewBox="0 0 1920 700" preserveAspectRatio="none">
  <defs><linearGradient id="rayG" x1="50%" y1="100%" x2="50%" y2="0%">
    <stop offset="0%" stop-color="#fff8d8" stop-opacity=".8"/>
    <stop offset="60%" stop-color="#fff8d8" stop-opacity=".3"/>
    <stop offset="100%" stop-color="#fff8d8" stop-opacity="0"/>
  </linearGradient></defs>
  <g fill="url(#rayG)">
    <polygon points="960,700 880,0 1040,0"/><polygon points="960,700 760,0 800,0"/>
    <polygon points="960,700 1120,0 1160,0"/><polygon points="960,700 600,0 632,0"/>
    <polygon points="960,700 1288,0 1320,0"/><polygon points="960,700 420,0 444,0"/>
    <polygon points="960,700 1476,0 1500,0"/><polygon points="960,700 240,0 260,0"/>
    <polygon points="960,700 1660,0 1680,0"/><polygon points="960,700 80,0 96,0"/>
    <polygon points="960,700 1824,0 1840,0"/>
  </g>
</svg>

<!-- BG SKY CLOUDS (high, fluffy, stylized like manga) -->
<div class="bg-clouds">
  <div class="bg-cloud" style="top:30px;--cd:140s;--cx:-450px;--cdl:0s;">
    <div class="cb" style="width:340px; height:62px; background:#ffffff;">
      <div style="width:160px;height:120px;background:#ffffff;top:-60px;left:60px;"></div>
      <div style="width:120px;height:90px;background:#ffffff;top:-45px;left:170px;"></div>
      <div style="width:90px;height:70px;background:#ffffff;top:-32px;left:14px;"></div>
      <div style="width:100px;height:78px;background:#ffffff;top:-38px;left:240px;"></div>
    </div>
  </div>
  <div class="bg-cloud" style="top:90px;--cd:160s;--cx:900px;--cdl:-40s;">
    <div class="cb" style="width:280px; height:55px; background:#ffffff;">
      <div style="width:130px;height:100px;background:#ffffff;top:-50px;left:50px;"></div>
      <div style="width:95px;height:75px;background:#ffffff;top:-38px;left:150px;"></div>
      <div style="width:75px;height:60px;background:#ffffff;top:-28px;left:8px;"></div>
    </div>
  </div>
  <div class="bg-cloud" style="top:175px;--cd:180s;--cx:-280px;--cdl:-20s;">
    <div class="cb" style="width:380px; height:55px; background:#ffffff;">
      <div style="width:170px;height:120px;background:#ffffff;top:-58px;left:80px;"></div>
      <div style="width:130px;height:95px;background:#ffffff;top:-45px;left:200px;"></div>
      <div style="width:100px;height:78px;background:#ffffff;top:-35px;left:280px;"></div>
      <div style="width:88px;height:68px;background:#ffffff;top:-30px;left:14px;"></div>
    </div>
  </div>
  <div class="bg-cloud" style="top:60px;--cd:200s;--cx:1300px;--cdl:-80s;">
    <div class="cb" style="width:240px; height:48px; background:#ffffff;">
      <div style="width:115px;height:85px;background:#ffffff;top:-42px;left:40px;"></div>
      <div style="width:80px;height:65px;background:#ffffff;top:-30px;left:130px;"></div>
    </div>
  </div>
</div>

<!-- BEANSTALK GIANT JACK — left -->
<div class="beanstalk left">
  <svg width="220" height="780" viewBox="0 0 220 780" fill="none">
    <defs>
      <linearGradient id="bsLG" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#4a8030"/>
        <stop offset="40%" stop-color="#7ac058"/>
        <stop offset="60%" stop-color="#a8d878"/>
        <stop offset="100%" stop-color="#3a6020"/>
      </linearGradient>
    </defs>
    <!-- twisted braid - two strands intertwining -->
    <g opacity=".95">
      <!-- strand A -->
      <path d="M70 0 Q140 60 90 130 Q40 200 110 270 Q170 340 100 410 Q30 480 110 550 Q180 620 100 690 Q60 740 90 780"
            stroke="url(#bsLG)" stroke-width="38" fill="none" stroke-linecap="round"/>
      <!-- strand B -->
      <path d="M150 0 Q80 60 130 130 Q180 200 110 270 Q50 340 120 410 Q190 480 110 550 Q40 620 120 690 Q160 740 130 780"
            stroke="url(#bsLG)" stroke-width="38" fill="none" stroke-linecap="round"/>
      <!-- shadow strand under -->
      <path d="M70 0 Q140 60 90 130 Q40 200 110 270 Q170 340 100 410 Q30 480 110 550 Q180 620 100 690"
            stroke="#3a6020" stroke-width="22" fill="none" stroke-linecap="round" opacity=".5"/>
    </g>
    <!-- segment rings -->
    <ellipse cx="100" cy="80" rx="34" ry="6" fill="#3a6020" opacity=".5"/>
    <ellipse cx="100" cy="195" rx="34" ry="6" fill="#3a6020" opacity=".5"/>
    <ellipse cx="100" cy="310" rx="34" ry="6" fill="#3a6020" opacity=".5"/>
    <ellipse cx="100" cy="425" rx="34" ry="6" fill="#3a6020" opacity=".5"/>
    <ellipse cx="100" cy="540" rx="34" ry="6" fill="#3a6020" opacity=".5"/>
    <ellipse cx="100" cy="655" rx="34" ry="6" fill="#3a6020" opacity=".5"/>
    <!-- highlights on strands -->
    <path d="M82 30 Q120 80 95 125" stroke="#bce098" stroke-width="6" fill="none" opacity=".6"/>
    <path d="M120 250 Q90 290 105 340" stroke="#bce098" stroke-width="6" fill="none" opacity=".6"/>
    <path d="M85 480 Q120 520 100 570" stroke="#bce098" stroke-width="6" fill="none" opacity=".6"/>
    <!-- leaves sprouting -->
    <ellipse cx="160" cy="160" rx="32" ry="14" fill="#7ac058" transform="rotate(20,160,160)"/>
    <ellipse cx="158" cy="158" rx="16" ry="6" fill="#a8d878" transform="rotate(20,158,158)"/>
    <ellipse cx="40" cy="370" rx="28" ry="12" fill="#7ac058" transform="rotate(-25,40,370)"/>
    <ellipse cx="42" cy="368" rx="14" ry="5" fill="#a8d878" transform="rotate(-25,42,368)"/>
    <ellipse cx="170" cy="600" rx="30" ry="13" fill="#7ac058" transform="rotate(15,170,600)"/>
    <ellipse cx="168" cy="598" rx="15" ry="5" fill="#a8d878" transform="rotate(15,168,598)"/>
  </svg>
</div>

<!-- BEANSTALK GIANT JACK — right -->
<div class="beanstalk right">
  <svg width="240" height="820" viewBox="0 0 240 820" fill="none" style="transform:scaleX(-1);">
    <defs>
      <linearGradient id="bsRG" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#4a8030"/>
        <stop offset="40%" stop-color="#7ac058"/>
        <stop offset="60%" stop-color="#a8d878"/>
        <stop offset="100%" stop-color="#3a6020"/>
      </linearGradient>
    </defs>
    <g opacity=".95">
      <path d="M80 0 Q160 70 100 145 Q40 220 130 295 Q200 370 110 445 Q40 520 130 600 Q200 670 110 740 Q70 790 100 820"

    <ellipse cx="178" cy="178" rx="18" ry="6" fill="#a8d878" transform="rotate(20,178,178)"/>
    <ellipse cx="55" cy="400" rx="32" ry="13" fill="#7ac058" transform="rotate(-25,55,400)"/>
    <ellipse cx="57" cy="398" rx="16" ry="5" fill="#a8d878" transform="rotate(-25,57,398)"/>
    <ellipse cx="195" cy="640" rx="34" ry="14" fill="#7ac058" transform="rotate(15,195,640)"/>
    <ellipse cx="193" cy="638" rx="17" ry="5" fill="#a8d878" transform="rotate(15,193,638)"/>
  </svg>
</div>

<!-- ANGEL ISLAND — large sky island in the distance with ancient marble ruins -->
<div class="angel-island">
  <svg width="1600" height="410" viewBox="0 0 1400 360" fill="none">
    <defs>
      <linearGradient id="islGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#b8e088"/>
        <stop offset="100%" stop-color="#5a9038"/>
      </linearGradient>
      <linearGradient id="rockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#d4b888"/>
        <stop offset="100%" stop-color="#8a6038"/>
      </linearGradient>
      <linearGradient id="marbleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#fff8e8"/>
        <stop offset="100%" stop-color="#c8b890"/>
      </linearGradient>
    </defs>
    <!-- island base broad rocky -->
    <path d="M40 230 Q120 185 240 170 Q380 158 540 162 Q700 158 860 162 Q1020 158 1180 175 Q1300 195 1340 225 Q1330 280 1240 310 Q1050 335 800 335 Q540 335 320 320 Q180 305 80 280 Z" fill="url(#rockGrad)"/>
    <!-- mid ledge -->
    <path d="M60 205 Q200 165 420 158 Q620 152 820 158 Q1040 165 1280 195 Q1240 215 1140 220 Q920 230 700 230 Q480 230 280 220 Q140 215 70 210 Z" fill="#c8a878"/>
    <!-- grass top -->
    <path d="M60 200 Q200 148 420 138 Q620 132 820 138 Q1040 148 1280 188 Q1140 200 920 200 Q700 200 480 200 Q280 200 70 202 Z" fill="url(#islGrad)"/>
    <path d="M120 180 Q320 148 560 140 Q780 138 1000 148 Q1200 162 1260 182" stroke="#cce8a0" stroke-width="3" fill="none" opacity=".7"/>

    <!-- LEFT SIDE: ancient marble ruins covered in green -->
    <!-- broken column 1 -->
    <g transform="translate(150,170)">

<script>
  const pEl = document.getElementById('particlesEl');
  for (let i=0; i<35; i++) {
    const s=document.createElement('div'); s.className='sparkle';
    const sz=Math.random()*4+2;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*1920}px;top:${Math.random()*900}px;--st:${(2+Math.random()*4).toFixed(1)}s;--stl:${(Math.random()*5).toFixed(1)}s`;
    pEl.appendChild(s);
  }
  for (let i=0; i<8; i++) {
    const f=document.createElement('div'); f.className='feather';
    const sz=10+Math.random()*8;
    const startX=Math.random()*1920, startY=-50+Math.random()*200;
    const fy=700+Math.random()*300, fx=-60+Math.random()*120, fr=180+Math.random()*360;
    const ff=12+Math.random()*16, ffl=-Math.random()*18;
    f.style.cssText=`left:${startX}px;top:${startY}px;--ff:${ff.toFixed(1)}s;--ffl:${ffl.toFixed(1)}s;--fy:${fy}px;--fx:${fx}px;--fr:${fr}deg`;
    f.innerHTML=`<svg width="${sz}" height="${sz*2}" viewBox="0 0 12 24" fill="none"><path d="M6 0 Q11 8 6 23 Q1 8 6 0 Z" fill="white" stroke="rgba(180,140,60,.4)" stroke-width=".5"/><line x1="6" y1="2" x2="6" y2="22" stroke="rgba(180,140,60,.5)" stroke-width=".6"/></svg>`;
    pEl.appendChild(f);
  }

  const bEl = document.getElementById('birdsEl');
  const bd = [
    {x:-150,y:140,s:.8,d:32,dl:0,by:-15,bf:.85},
    {x:-220,y:200,s:.6,d:42,dl:-10,by:-8,bf:1.1},
    {x:-100,y:90,s:.7,d:26,dl:-4,by:-22,bf:.75},
    {x:-180,y:240,s:.55,d:48,dl:-16,by:-5,bf:1.3},
    {x:-130,y:160,s:.75,d:34,dl:-20,by:-12,bf:.9},
    {x:-200,y:300,s:.6,d:50,dl:-25,by:-6,bf:1.0},
    {x:-90,y:110,s:.5,d:38,dl:-7,by:-18,bf:.8},
  ];
  bd.forEach(b => {
    const w=document.createElement('div'); w.className='bird';
    w.style.cssText=`left:0;top:${b.y}px;--bx:${b.x}px;--bd:${b.d}s;--bdl:${b.dl}s;--by:${b.by}px`;
    const ws=document.createElement('div'); ws.className='bird-wings';
    ws.style.cssText=`--bf:${b.bf}s`;
    const sc=b.s;
    ws.innerHTML=`<svg width="${Math.round(34*sc)}" height="${Math.round(18*sc)}" viewBox="0 0 34 18" fill="none">
      <path d="M17 9 Q9 2 0 5" stroke="rgba(60,40,20,.7)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M17 9 Q25 2 34 5" stroke="rgba(60,40,20,.7)" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>`;
    w.appendChild(ws); bEl.appendChild(w);
  });

  const TOTAL=5*60, CIRC=2*Math.PI*84;
  const arcFill=document.getElementById('arcFill'), digits=document.getElementById('timerDigits');
  const overlay=document.getElementById('liveOverlay'), banner=document.getElementById('liveBanner');
  let rem=TOTAL;
  function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
  function arc(r){arcFill.style.strokeDashoffset=CIRC*(1-r/TOTAL);}
  arc(rem);
  const iv=setInterval(()=>{rem--; if(rem<=0){clearInterval(iv); digits.textContent='LIVE!'; arc(0); overlay.classList.add('flash'); banner.classList.add('show'); return;} digits.textContent=fmt(rem); arc(rem);},1000);
</script>
